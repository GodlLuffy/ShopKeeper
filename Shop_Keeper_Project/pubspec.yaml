name: shop_keeper_project
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.10.1
  cloud_firestore: ^5.6.2
  firebase_auth: ^5.4.4
  firebase_storage: ^12.4.10
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^18.0.1
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # State Management & DI
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  get_it: ^8.0.3
  dartz: ^0.10.1

  # Navigation & Routing
  go_router: ^14.7.2

  # Data Persistence (Offline Support)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Charts & UI Utilities
  fl_chart: 0.69.2
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  intl: ^0.19.0
  uuid: ^4.5.1
  connectivity_plus: ^6.1.3
  path_provider: ^2.1.5
  path: ^1.9.0

  cupertino_icons: ^1.0.8
  flutter_secure_storage: ^10.0.0
  mobile_scanner: ^6.0.11
  sms_autofill: ^2.4.1
  local_auth: ^2.3.0
  crypto: ^3.0.7
  image_cropper: ^5.0.0
  barcode_widget: ^2.0.4
  permission_handler: ^11.0.1
  share_plus: ^12.0.2
  url_launcher: ^6.2.0
  pdf: ^3.11.1
  printing: ^5.13.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

flutter_native_splash:
  color: "#0F111A"
  image: "assets/images/logo.png"
  android: true
  ios: true
  fullscreen: true
